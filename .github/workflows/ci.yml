name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  pre-checks:
    name: Type-check, Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup

      - name: Type-check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint-check

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

  update-coverage-badge:
    name: Update Coverage in README
    runs-on: ubuntu-latest
    needs: pre-checks
    if: github.event_name == 'push'

    permissions:
      contents: write

    env:
      HUSKY: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js & pnpm
        uses: ./.github/actions/setup

      - name: Generate coverage & update README
        run: pnpm run test:coverage:readme

      - name: Commit updated README
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md
          git diff --cached --quiet || git commit --no-verify -m "chore: update coverage table in README [skip ci]"
          git push
